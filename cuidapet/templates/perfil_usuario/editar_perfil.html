<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuidaPet - Editar Perfil</title>

    <link rel="stylesheet" href="../../static/css/base.css" />
    <link rel="stylesheet" href="../../static/css/header.css" />
    <link rel="stylesheet" href="../../static/css/pages/editar_perfil.css" />
  </head>
  <body>
    <!-- Cebeçalho -->
    <header class="cabecalho">
      <h1 class="logo-cuidapet">
        <a href="../pagina_principal/pagina_principal.html">CUIDAPET</a>
      </h1>

      <nav class="navegacao">
        <ul>
          <li>
            <a href="../pagina_principal/pagina_principal.html">HOME</a>
          </li>
          <li>
            <a href="../sobre_nos/sobre_nos.html">SOBRE NÓS</a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- /Cabeçalho -->

    <section class="editar-perfil" id="editar-perfil">
      <!-- Container editar perfil -->
      <div class="editar-perfil-container">
        <!-- Título -->
        <div class="titulo-editar-perfil">
          <h2>EDITAR PERFIL</h2>
        </div>
        <!-- /Título -->

        <!-- Inputs do usuario -->
        <form
          class="interacao-usuario"
          action="./perfil_usuario.html"
          method="POST"
        >
          <label for="input-nome-completo">Nome completo:</label>
          <input
            type="text"
            class="input-nome-completo"
            placeholder="Nome completo"
          />

          <label for="input-email">E-mail:</label>
          <input type="email" class="input-email" placeholder="E-mail" />

          <label for="input-senha">Senha:</label>
          <input type="password" class="input-senha" placeholder="Senha" />

          <label for="input-confirmacao-senha">Confirmação de senha:</label>
          <input
            type="password"
            class="input-confirmacao-senha"
            placeholder="Confirmação de senha"
          />

          <button type="submit" class="salvar">
            <h3 class="texto-salvar">SALVAR</h3>
          </button>
        </form>
        <!-- /inputs do usuário -->
      </div>
      <!-- /Container editar perfil -->
    </section>
    <script src="../../static/js/auth.js"></script>
    <script>
      async function atualizarPerfil() {
        const name = document.getElementById("edit-nome").value;
        const email = document.getElementById("edit-email").value;
        const password = document.getElementById("edit-senha").value;
        const confirmPassword = document.getElementById(
          "edit-confirmacao-senha"
        ).value;

        // Validação se senha foi fornecida
        if (password && password !== confirmPassword) {
          alert("As senhas não coincidem!");
          return;
        }

        const result = await updateUser(name, email, password);

        if (result.error) {
          alert(result.message);
        } else {
          alert("Perfil atualizado com sucesso!");
          window.location.href = "./perfil_usuario.html";
        }
      }
    </script>
  </body>
</html>
